services:
  # Backend Web Service (SQLite, ephemeral data)
  - type: web
    name: munna-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: CLIENT_URL
        value: https://munna-frontend.onrender.com
      - key: NODE_ENV
        value: production

  # Frontend Web Service
  - type: web
    name: munna-frontend
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://munna-backend.onrender.com/api
      - key: NODE_ENV
        value: production
